{% extends "base.html" %}
{% block title %}Create User — Tool Kit{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-3">
    <a href="{{ url_for('admin.users') }}" class="btn btn-sm btn-outline-secondary">
        <i class="fa-solid fa-arrow-left me-1"></i>Back
    </a>
    <h3 class="mb-0"><i class="fa-solid fa-user-plus me-2 text-success"></i>Create User</h3>
</div>

<div class="card" style="max-width: 520px">
  <div class="card-body">
    <form method="POST" action="{{ url_for('admin.create_user') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
            <label class="form-label fw-500">Username <span class="text-danger">*</span></label>
            <input name="username" class="form-control"
                   value="{{ form.get('username', '') }}"
                   placeholder="e.g. john_doe" required minlength="3"
                   autocomplete="off">
            <div class="form-text">Min 3 characters. Must be unique.</div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-500">Email</label>
            <input name="email" type="email" class="form-control"
                   value="{{ form.get('email', '') }}"
                   placeholder="user@example.com"
                   autocomplete="off">
        </div>

        <div class="mb-3">
            <label class="form-label fw-500">Role <span class="text-danger">*</span></label>
            <select name="role" class="form-select" required>
                <option value="viewer" {{ 'selected' if form.get('role','viewer') == 'viewer' }}>
                    Viewer — read-only access
                </option>
                <option value="admin" {{ 'selected' if form.get('role') == 'admin' }}>
                    Admin — full access (add sites, manage users)
                </option>
            </select>
        </div>

        <hr>

        <div class="mb-3">
            <label class="form-label fw-500">Password <span class="text-danger">*</span></label>
            <div class="input-group">
                <input name="password" id="pwdField" type="password"
                       class="form-control" placeholder="Min 8 characters"
                       required minlength="8" autocomplete="new-password">
                <button type="button" class="btn btn-outline-secondary"
                        onclick="toggleVis('pwdField', this)">
                    <i class="fa-solid fa-eye"></i>
                </button>
                <button type="button" class="btn btn-outline-secondary"
                        onclick="generatePwd()" title="Generate password">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-500">Confirm Password <span class="text-danger">*</span></label>
            <div class="input-group">
                <input name="confirm" id="confirmField" type="password"
                       class="form-control" placeholder="Repeat password"
                       required minlength="8" autocomplete="new-password">
                <button type="button" class="btn btn-outline-secondary"
                        onclick="toggleVis('confirmField', this)">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
            <div id="matchError" class="text-danger mt-1" style="font-size:12px"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success" onclick="return validateForm()">
                <i class="fa-solid fa-user-plus me-1"></i>Create User
            </button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">
                Cancel
            </a>
        </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const CHARSET = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

function generatePwd() {
    const arr = new Uint32Array(16);
    crypto.getRandomValues(arr);
    const pwd = Array.from(arr, n => CHARSET[n % CHARSET.length]).join("");
    document.getElementById("pwdField").value     = pwd;
    document.getElementById("confirmField").value = pwd;
    // Show the password so user can copy it
    document.getElementById("pwdField").type     = "text";
    document.getElementById("confirmField").type = "text";
    showToast("Password generated — copy it before saving!");
}

function toggleVis(fieldId, btn) {
    const f = document.getElementById(fieldId);
    f.type = f.type === "password" ? "text" : "password";
    btn.querySelector("i").className =
        f.type === "text" ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
}

function validateForm() {
    const pwd     = document.getElementById("pwdField").value;
    const confirm = document.getElementById("confirmField").value;
    const err     = document.getElementById("matchError");
    err.innerText = "";
    if (pwd !== confirm) {
        err.innerText = "Passwords do not match.";
        document.getElementById("confirmField").focus();
        return false;
    }
    return true;
}
</script>
{% endblock %}
