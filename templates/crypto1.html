{% extends "base.html" %}
{% block title %}Crypto Tools{% endblock %}

{% block extra_head %}
<style>
.tool-panel {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    background: #fff;
    padding: 22px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.editor-box {
    background: #0f172a;
    color: #22d3ee;
    font-family: monospace;
    font-size: 13px;
    border: 1px solid #334155;
    border-radius: 7px;
    padding: 12px;
    min-height: 60px;
    white-space: pre-wrap;
    word-break: break-all;
    outline: none;
}
.box-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: .05em;
}
.box-actions button {
    background: #f1f5f9;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 12px;
    cursor: pointer;
    margin-left: 4px;
}
.box-actions button:hover { background: #e2e8f0; }
</style>
{% endblock %}

{% block content %}
<h3><i class="fa-solid fa-lock me-2 text-success"></i>Crypto Tools</h3>

<form method="POST" action="{{ url_for('crypto.crypto_page') }}" id="cryptoForm">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="selected_tool" id="selectedToolInput" value="{{ selected_tool or 'aes' }}">

<!-- Tool selector -->
<div class="mb-4" style="max-width:280px">
    <label class="form-label fw-500">Select Tool</label>
    <select id="toolSelector" class="form-select" onchange="switchTool()">
        <option value="aes">🔑 AES Encryption (Fernet)</option>
        <option value="base64">🔄 Base64 Encode / Decode</option>
        <option value="password">🔐 Password Generator</option>
    </select>
</div>

<!-- ── AES tool ── -->
<div id="aesTool" class="tool-panel" style="display:none">
    <div class="mb-4">
        <label class="form-label fw-500">AES Key</label>
        <div class="input-group">
            <input id="keyField" type="password" name="key"
                   class="form-control font-monospace" value="{{ key or '' }}"
                   placeholder="Leave blank to auto-generate on encrypt">
            <button type="button" class="btn btn-outline-secondary" onclick="toggleKeyVis()" title="Show/hide">👁</button>
            <button type="button" class="btn btn-outline-secondary" onclick="copyKey()" title="Copy">📋</button>
            <button type="button" class="btn btn-outline-success"   onclick="generateKey()" title="Generate">🔑 Generate</button>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="box-header">
                Input
                <div class="box-actions">
                    <button type="button" onclick="clearAES()">Clear</button>
                </div>
            </div>
            <div id="aesInput" class="editor-box" contenteditable="true"></div>
            <input type="hidden" name="input_text" id="hiddenAES">
        </div>
        <div class="col-md-6">
            <div class="box-header">
                Output
                <div class="box-actions">
                    <button type="button" onclick="copyAESOutput()">📋 Copy</button>
                    <button type="button" onclick="downloadAESOutput()">⬇ Save</button>
                </div>
            </div>
            <div id="aesOutput" class="editor-box">{{ output or '' }}</div>
        </div>
    </div>

    <div class="mt-3 d-flex gap-2">
        <button name="action" value="aes_encrypt" class="btn btn-success">🔐 Encrypt</button>
        <button name="action" value="aes_decrypt" class="btn btn-warning">🔓 Decrypt</button>
    </div>
</div>

<!-- ── Base64 tool ── -->
<div id="base64Tool" class="tool-panel" style="display:none">
    <div class="row g-3">
        <div class="col-md-6">
            <div class="box-header">Input</div>
            <div id="b64Input" class="editor-box" contenteditable="true"></div>
            <input type="hidden" name="input_text_b64" id="hiddenB64">
        </div>
        <div class="col-md-6">
            <div class="box-header">
                Output
                <div class="box-actions">
                    <button type="button" onclick="copyB64Output()">📋 Copy</button>
                </div>
            </div>
            <div id="b64Output" class="editor-box">{{ output or '' }}</div>
        </div>
    </div>
    <div class="mt-3 d-flex gap-2">
        <button name="action" value="base64_encode" class="btn btn-secondary">Encode</button>
        <button name="action" value="base64_decode" class="btn btn-dark">Decode</button>
    </div>
</div>

<!-- ── Password generator (client-side only) ── -->
<div id="passwordTool" class="tool-panel" style="display:none">
    <label class="form-label fw-500">Generated Password</label>
    <div class="input-group mb-3" style="max-width:480px">
        <input id="pwdField" class="form-control font-monospace" readonly placeholder="Click Generate…">
        <button type="button" class="btn btn-outline-success" onclick="generatePwd()">Generate</button>
        <button type="button" class="btn btn-outline-secondary" onclick="copyPwd()">📋 Copy</button>
    </div>
    <div class="d-flex align-items-center gap-3">
        <label class="form-label mb-0 fw-500">Length</label>
        <input type="range" id="pwdLen" min="8" max="64" value="20" oninput="updateLenLabel()" style="width:200px">
        <span id="lenLabel">20</span>
    </div>
</div>

</form>
{% endblock %}

{% block extra_scripts %}
<script>
const TOOL_NAMES = ["aes", "base64", "password"];

function switchTool() {
    const t = document.getElementById("toolSelector").value;
    document.getElementById("selectedToolInput").value = t;
    TOOL_NAMES.forEach(n => {
        document.getElementById(n + "Tool").style.display = (n === t ? "block" : "none");
    });
    // Always clear outputs when manually switching — prevents cross-tool bleed
    document.getElementById("aesOutput").innerText = "";
    document.getElementById("b64Output").innerText = "";
    document.getElementById("aesInput").innerText  = "";
    document.getElementById("b64Input").innerText  = "";
}

document.addEventListener("DOMContentLoaded", () => {
    const sel = "{{ selected_tool or 'aes' }}";
    // Only restore output into the panel that actually produced it
    const out = {{ (output | tojson) if output else 'null' }};
    document.getElementById("toolSelector").value = sel;
    switchTool();
    // Inject output only into the matching tool panel — never cross-pollinate
    if (out !== null) {
        if (sel === "aes")    document.getElementById("aesOutput").innerText = out;
        if (sel === "base64") document.getElementById("b64Output").innerText = out;
    }
});

// Capture contenteditable → hidden input before submit
document.getElementById("cryptoForm").addEventListener("submit", () => {
    document.getElementById("hiddenAES").value = document.getElementById("aesInput").innerText;
    document.getElementById("hiddenB64").value = document.getElementById("b64Input").innerText;
    document.getElementById("selectedToolInput").value = document.getElementById("toolSelector").value;
});

// AES helpers
function generateKey() {
    fetch("/generate_key").then(r => r.text()).then(k => {
        document.getElementById("keyField").value = k;
        showToast("Key generated ✓");
    });
}
function toggleKeyVis() {
    const f = document.getElementById("keyField");
    f.type = f.type === "password" ? "text" : "password";
}
function copyKey() {
    navigator.clipboard.writeText(document.getElementById("keyField").value);
    showToast("Key copied ✓");
}
function copyAESOutput() {
    navigator.clipboard.writeText(document.getElementById("aesOutput").innerText);
    showToast("Copied ✓");
}
function downloadAESOutput() {
    const blob = new Blob([document.getElementById("aesOutput").innerText]);
    const a = Object.assign(document.createElement("a"), {
        href: URL.createObjectURL(blob), download: "output.txt"
    });
    a.click();
}
function clearAES() {
    document.getElementById("aesInput").innerText = "";
    document.getElementById("aesOutput").innerText = "";
}

// Base64 helpers
function copyB64Output() {
    navigator.clipboard.writeText(document.getElementById("b64Output").innerText);
    showToast("Copied ✓");
}

// Password generator
const CHARSET = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()-_=+";
function generatePwd() {
    const len = parseInt(document.getElementById("pwdLen").value);
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    document.getElementById("pwdField").value =
        Array.from(arr, n => CHARSET[n % CHARSET.length]).join("");
    showToast("Password generated ✓");
}
function copyPwd() {
    const v = document.getElementById("pwdField").value;
    if (!v) { showToast("Generate first", "#dc2626"); return; }
    navigator.clipboard.writeText(v);
    showToast("Copied ✓");
}
function updateLenLabel() {
    document.getElementById("lenLabel").innerText =
        document.getElementById("pwdLen").value;
}
</script>
{% endblock %}
