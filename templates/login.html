<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — OpsSecure Suite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='fonts/fa/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/inter.css') }}">
    <style>
        body { background: #0f172a; }
        .login-card {
            width: 360px;
            border-radius: 14px;
            border: 1px solid #1e293b;
            background: #1e293b;
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
        }
        .login-card .card-body { padding: 36px 32px; }
        .brand { color: #38bdf8; font-size: 22px; font-weight: 700; }
        .brand i { margin-right: 8px; }
        .sub { color: #64748b; font-size: 13px; margin-bottom: 28px; }
        label { font-size: 12px; color: #94a3b8; font-weight: 500; }
        .form-control {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
            font-size: 13px;
        }
        .form-control:focus {
            background: #0f172a;
            border-color: #38bdf8;
            color: #f1f5f9;
            box-shadow: 0 0 0 3px rgba(56,189,248,.15);
        }
        .form-control::placeholder { color: #475569; }
        .btn-login {
            background: #0ea5e9;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            transition: background .2s;
        }
        .btn-login:hover { background: #0284c7; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="login-card">
    <div class="card-body">
        <div class="text-center mb-1">
            <div class="brand"><i class="fa-solid fa-shield-halved"></i>OpsSecure Suite</div>
        </div>
        <p class="text-center sub">Sign in to continue</p>
        <!-- <p class="text-center sub">Sign in to continue</p> -->


        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 mb-3" style="font-size:13px">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="username">Username</label>
                <input id="username" name="username" type="text"
                       class="form-control mt-1" placeholder="admin"
                       autocomplete="username" required>
            </div>

            <div class="mb-4">
                <label for="password">Password</label>
                <input id="password" name="password" type="password"
                       class="form-control mt-1" placeholder="••••••••"
                       autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>
        </form>
    </div>
</div>

</body>
</html>
